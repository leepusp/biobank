<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Shipment submitted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center">
            <h1 class="h3 mb-2">Shipment submitted</h1>
            <p class="text-muted">Your shipment request was registered successfully.</p>

            <div class="my-4">
                <div class="text-muted">Shipment code</div>
                <div class="h4">{{ shipment.shipment_code }}</div>
            </div>

            <img src="{{ public_qr_data_uri }}" alt="Public shipment QR code" class="img-fluid mb-3" style="max-width: 240px;">

            <div class="small text-muted text-break mb-4">
                {{ public_tracking_url }}
            </div>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="{{ public_tracking_url }}" class="btn btn-outline-primary">
                    Open tracking page
                </a>

                <a href="{% url 'public_shipment_documents' edit_token.token %}" class="btn btn-primary">
                    Documents and signature
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
