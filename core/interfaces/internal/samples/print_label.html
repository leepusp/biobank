<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Label - {{ sample.sample_id }}</title>
    <style>
        /* CSS otimizado para impressão de etiquetas de tubo de ensaio/criotubo */
        @media print {
            @page { margin: 0; }
            body { margin: 0; padding: 0; background: white; }
            .no-print { display: none; }
        }
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            display: flex; 
            justify-content: center; 
            background: #f4f4f4;
        }
        .label-container {
            width: 50mm; /* Tamanho padrão de etiqueta de criotubo */
            height: 25mm;
            background: white;
            border: 1px dashed #ccc; /* Guia de corte (não aparece na impressora real) */
            display: flex;
            align-items: center;
            padding: 2mm;
            box-sizing: border-box;
            overflow: hidden;
        }
        .qr-code {
            width: 20mm;
            height: 20mm;
            margin-right: 2mm;
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .text-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .sample-id {
            font-size: 8pt;
            font-weight: bold;
            margin-bottom: 2px;
            word-wrap: break-word;
        }
        .organism {
            font-size: 6pt;
            line-height: 1.1;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .date {
            font-size: 5pt;
            margin-top: 2px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="no-print" style="position: absolute; top: 10px; left: 10px;">
        <button onclick="window.print()" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">
            🖨️ Print Label
        </button>
        <p style="font-size: 12px; color: #666;">Set margins to "None" in print dialog.</p>
    </div>

    <div class="label-container">
        <div class="qr-code">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR">
        </div>
        <div class="text-info">
            <div class="sample-id">{{ sample.sample_id }}</div>
            <div class="organism">{{ sample.organism_name|default:sample.sample_type|truncatechars:35 }}</div>
            <div class="date">{{ sample.created_at|date:"d/m/Y" }}</div>
        </div>
    </div>

</body>
</html>
