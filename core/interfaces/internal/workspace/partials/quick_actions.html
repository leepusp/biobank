<div class="sidebar-box quick-actions workspace-section">
    <h4 class="h6 fw-bold mb-3"><i class="bi bi-lightning-charge me-2 text-warning"></i>Quick Actions</h4>

    <div class="d-grid gap-2">
        <a href="/?page=biobanks" class="btn btn-sm btn-outline-primary text-start">
            <i class="bi bi-building-add me-2"></i> Register Biobank
        </a>
        <a href="/?page=collections" class="btn btn-sm btn-outline-primary text-start">
            <i class="bi bi-folder-plus me-2"></i> Create Collection
        </a>
        <a href="/?page=samples" class="btn btn-sm btn-outline-primary text-start">
            <i class="bi bi-flask me-2"></i> Register Sample
        </a>

        <hr class="my-2">
        <h6 class="text-uppercase text-muted fw-bold" style="font-size: 0.65rem; letter-spacing: 0.05em; margin-bottom: 8px;">Data Management</h6>

        <button type="button" class="btn btn-sm btn-outline-success text-start" data-bs-toggle="modal" data-bs-target="#backupModal">
            <i class="bi bi-archive-fill me-2"></i> Export / Backup Data
        </button>

        {% if request.user.is_staff %}
            <hr class="my-2">
            <a href="/admin/" target="_blank" class="btn btn-sm btn-outline-secondary text-start">
                <i class="bi bi-shield-lock me-2"></i> Admin Panel
            </a>
        {% endif %}
    </div>

        <a href="{% url 'shipments' %}" class="btn btn-sm btn-outline-primary text-start">
            <i class="bi bi-truck me-2"></i> Transport / Shipments
        </a>

</div>

<style>
    .quick-actions .btn:hover { transform: translateX(3px); transition: all 0.2s; }
    .btn-outline-success:hover { background-color: #198754 !important; border-color: #198754 !important; color: white !important; }
</style>
