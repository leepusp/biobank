<div class="chem-document-row" data-document-form>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <strong class="small text-uppercase text-muted">Document</strong>
        {% if show_remove %}
        <button type="button" class="btn btn-sm btn-outline-danger" data-remove-document>
            <i class="bi bi-trash me-1"></i>Remove
        </button>
        {% endif %}
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <label class="form-label">File</label>
            <input type="file" name="documents-{{ document_index }}-file" class="form-control">
            <div class="chem-help mt-1">Maximum size: 25 MB.</div>
        </div>
        <div class="col-lg-4">
            <label class="form-label">Title</label>
            <input type="text" name="documents-{{ document_index }}-title" class="form-control" placeholder="Uses the filename when empty">
        </div>
        <div class="col-lg-4">
            <label class="form-label">Document type</label>
            <select name="documents-{{ document_index }}-document_type" class="form-select" data-document-type>
                {% for value, label in document_types %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Version</label>
            <input type="text" name="documents-{{ document_index }}-version" class="form-control" placeholder="e.g. 2.1">
        </div>
        <div class="col-md-3">
            <label class="form-label">Document date</label>
            <input type="date" name="documents-{{ document_index }}-document_date" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" name="documents-{{ document_index }}-description" class="form-control" placeholder="Optional document description">
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documents-{{ document_index }}-is_primary" data-document-primary>
                <label class="form-check-label">Use as the primary SDS on the QR page</label>
            </div>
        </div>
    </div>
</div>
